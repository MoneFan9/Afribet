# AfriBet — orchestration multi-services (conception §11 : web, Channels, Celery,
# Redis, PostgreSQL). Le service `web` sert HTTP + WebSocket via daphne (ASGI).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afribet}
      POSTGRES_USER: ${POSTGRES_USER:-afribet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afribet}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      AFRIBET_DB: postgres
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      AFRIBET_DB: postgres
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

volumes:
  pgdata:
