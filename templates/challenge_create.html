{% extends "base.html" %}
{% block title %}Nouveau défi — AfriBet{% endblock %}
{% block content %}
<h1 class="text-xl font-bold text-vert mb-4">Créer un défi</h1>
<form method="post" action="/challenge/new/">{% csrf_token %}
  {% include "components/form_fields.html" %}
  <button class="btn btn-or mt-2">Lancer le défi</button>
</form>
<p class="mt-4 text-xs text-gray-500">Contre l'IA : la partie démarre aussitôt. En automatique :
  vous serez apparié à un adversaire.</p>
{% endblock %}
